version: v2
plugins:
  - local: protoc-gen-go
    out: ../internal/peer/peerpb
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../internal/peer/peerpb
    opt: paths=source_relative
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/krigsherre/krate/internal/peer