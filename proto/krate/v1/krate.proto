syntax = "proto3";
package krate.v1;

option go_package = "github.com/krigsherre/krate/peer/peerpb";

service KratePeerService {
  rpc TransferTokens(TransferRequest) returns (TransferResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Gossip(GossipRequest) returns (GossipResponse);
}

message TransferRequest {
  string limit_key = 1;
  uint64 requested = 2;
  string origin_id = 3;
}

message TransferResponse {
  uint64 granted = 1;
}

message PingRequest {}
message PingResponse {}

message GossipRequest {
  string origin_id = 1;
  bytes cms_state = 2;
  map<string, uint64> borrowed = 3;
}

message GossipResponse {}